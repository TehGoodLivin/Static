# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate files.json manifest
        run: |
          python3 << 'PYEOF'
          import os, json, sys

          IGNORE = {'.git', '.github', 'node_modules', '.DS_Store'}

          def build_tree(root):
              tree = {}
              for dirpath, dirnames, filenames in os.walk(root, topdown=True):
                  dirnames[:] = sorted(d for d in dirnames if d not in IGNORE)
                  filenames   = sorted(f for f in filenames if f not in IGNORE and f != 'files.json')

                  rel = os.path.relpath(dirpath, root)
                  if rel == '.':
                      rel = ''

                  node = tree
                  if rel:
                      for part in rel.replace('\\', '/').split('/'):
                          node = node.setdefault(part, {})

                  node['__files__'] = [
                      {
                          'name': f,
                          'size': os.path.getsize(os.path.join(dirpath, f))
                      }
                      for f in filenames
                  ]
              return tree

          tree = build_tree('.')
          out_path = os.path.join('.', 'files.json')
          with open(out_path, 'w') as fh:
              json.dump(tree, fh, separators=(',', ':'))

          size = os.path.getsize(out_path)
          print(f"files.json written ({size} bytes)")
          sys.exit(0)
          PYEOF

      - name: Verify files.json exists
        run: |
          if [ ! -f files.json ]; then
            echo "ERROR: files.json was not created!"
            exit 1
          fi
          echo "files.json OK — $(wc -c < files.json) bytes"
          echo "Root keys: $(python3 -c "import json; d=json.load(open('files.json')); print(list(d.keys())[:10])")"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
